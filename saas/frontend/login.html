<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — CarScan IDF</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="auth-page">

<nav>
  <a href="/" class="nav-brand">🚗 CarScan IDF</a>
  <div class="nav-links">
    <a href="/register.html">Créer un compte</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1>Connexion</h1>
    <div id="error-msg" class="error-msg hidden"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full" id="submit-btn">Se connecter</button>
    </form>
    <p class="auth-footer">Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.href = "/dashboard.html";
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    const errEl = document.getElementById("error-msg");
    btn.disabled = true;
    btn.textContent = "Connexion...";
    errEl.classList.add("hidden");

    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Erreur de connexion");
      localStorage.setItem("token", data.access_token);
      window.location.href = "/dashboard.html";
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Se connecter";
    }
  });
</script>
</body>
</html>
